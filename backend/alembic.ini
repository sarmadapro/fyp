# Alembic configuration file.
# Generated for VoiceRAG backend.

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path entry to import the backend app
prepend_sys_path = .

# Timezone for %%(year)d etc
# timezone =

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Set to true to run the environment during the 'revision' command,
# even when --autogenerate is not used.
revision_environment = false

# Set to 'true' to allow .pyc files without a source .py file to be detected
# as revisions in the versions/ directory
sourceless = false

# Version location: default is alembic/versions.
# Use forward slash on all platforms.
# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/alembic/versions

# The output encoding used when revision files are written from script.mako.
output_encoding = utf-8

# Database URL — read from .env at runtime (see env.py)
sqlalchemy.url = sqlite:///./data/voicerag.db


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black" entrypoint
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
